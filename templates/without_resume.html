<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Career Path | CareerLaunch AI</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="career-page">

    <div class="career-card">

        <h1>🚀 Start Without Resume</h1>

        <p>
            Select your dream role and start preparing with AI.
        </p>

        <form action="/skills" method="GET">

            <h2>Select Your Dream Role</h2>
            <div class="role-grid">

                <label class="role-card">
            
                    <input type="radio" name="job_role" value="Backend Developer">
            
                    <div class="role-icon">🖥️</div>
            
                    <h3>Backend Developer</h3>
            
                    <p>Build APIs, databases and server-side applications.</p>
            
                </label>
            
                <label class="role-card">
            
                    <input type="radio" name="job_role" value="Frontend Developer">
            
                    <div class="role-icon">🎨</div>
            
                    <h3>Frontend Developer</h3>
            
                    <p>Create beautiful and responsive user interfaces.</p>
            
                </label>
            
                <label class="role-card">
            
                    <input type="radio" name="job_role" value="AI/ML Engineer">
            
                    <div class="role-icon">🤖</div>
            
                    <h3>AI / ML Engineer</h3>
            
                    <p>Build intelligent systems using machine learning.</p>
            
                </label>
            
                <label class="role-card">
            
                    <input type="radio" name="job_role" value="Data Analyst">
            
                    <div class="role-icon">📊</div>
            
                    <h3>Data Analyst</h3>
            
                    <p>Analyze data and generate business insights.</p>
            
                </label>
            
                <label class="role-card">
            
                    <input type="radio" name="job_role" value="Python Developer">
            
                    <div class="role-icon">🐍</div>
            
                    <h3>Python Developer</h3>
            
                    <p>Develop applications and automation using Python.</p>
            
                </label>
            
                <label class="role-card">
            
                    <input type="radio" name="job_role" value="Java Developer">
            
                    <div class="role-icon">☕</div>
            
                    <h3>Java Developer</h3>
            
                    <p>Build enterprise applications using Java.</p>
            
                </label>
            
            </div>
            
            <div class="next-btn-container">
            
                <button type="submit" class="primary-btn">
            
                    Next →
            
                </button>
            
            </div>
            
            </form>
            
            </div>
            
            </div>
            
            </body>
            
            </html>
